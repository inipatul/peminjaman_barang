<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistem Peminjaman Barang</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Sistem Peminjaman Barang</h1>
      <p class="subtitle">Aplikasi Inventaris dan Peminjaman Barang</p>

      <!-- Statistik -->
      <div class="stats">
        <div class="card card-barang">
          <h3 id="totalBarang">0</h3>
          <p>Total Barang</p>
        </div>

        <div class="card card-pinjam">
          <h3 id="sedangDipinjam">0</h3>
          <p>Sedang Dipinjam</p>
        </div>

        <div class="card card-kembali">
          <h3 id="sudahKembali">0</h3>
          <p>Sudah Dikembalikan</p>
        </div>
      </div>

      <!-- Data Barang -->
      <div class="section">
     <div class="main-content">

    <div class="section">

        <h2> Data Barang</h2>

        <input id="nama" placeholder="Nama Barang">
        <input id="stok" placeholder="Stok">
        <input id="kondisi" placeholder="Kondisi Barang">

        <button class="btn-tambah" onclick="tambah()">
            Tambah Barang
        </button>

        <ul id="list"></ul>

    </div>

    <div class="section">

        <h2> Peminjaman</h2>

        <input id="nama_peminjam" placeholder="Nama Peminjam">
        <input id="barang_pinjam" placeholder="Nama Barang">
        <input id="jumlah" placeholder="Jumlah Dipinjam">
        <input type="date" id="tgl_pinjam">

        <button class="btn-tambah" onclick="pinjam()">
            Pinjam Barang
        </button>

        <ul id="listPinjam"></ul>

    </div>

</div>


    <script>
      // API URL - Auto-detect based on environment
      const isDev = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
      const API_URL = isDev ? "http://localhost:3000" : window.location.origin;

      // =======================
      // UTILITY - SHOW MESSAGE
      // =======================
      function showMessage(message, type = "info") {
        const messageDiv = document.createElement("div");
        messageDiv.style.cssText = `
          position: fixed;
          top: 20px;
          right: 20px;
          padding: 15px 20px;
          border-radius: 8px;
          color: white;
          font-weight: bold;
          z-index: 1000;
          animation: slideIn 0.3s ease;
        `;

        if (type === "success") {
          messageDiv.style.background = "#27ae60";
        } else if (type === "error") {
          messageDiv.style.background = "#e74c3c";
        } else {
          messageDiv.style.background = "#3498db";
        }

        messageDiv.textContent = message;
        document.body.appendChild(messageDiv);

        setTimeout(() => messageDiv.remove(), 3000);
      }

      // =======================
      // VALIDATE INPUT
      // =======================
      function validateInput(fields) {
        for (let field of fields) {
          if (!field.value.trim()) {
            showMessage(`${field.placeholder} tidak boleh kosong`, "error");
            return false;
          }
        }
        return true;
      }

      // =======================
      // CLEAR INPUTS
      // =======================
      function clearInputs(...inputIds) {
        inputIds.forEach(id => {
          document.getElementById(id).value = "";
        });
      }

      // =======================
      // LOAD BARANG
      // =======================
      function load() {
        console.log("Loading barang from:", `${API_URL}/barang`);
        fetch(`${API_URL}/barang`)
          .then((res) => {
            if (!res.ok) throw new Error(`API Error ${res.status}: ${res.statusText}`);
            return res.json();
          })
          .then((data) => {
            let list = document.getElementById("list");
            list.innerHTML = "";

            if (data.length === 0) {
              list.innerHTML = "<li>Tidak ada data barang</li>";
              return;
            }

            data.forEach((item) => {
              let li = document.createElement("li");

              li.innerHTML = `
                <strong>${item.nama_barang}</strong><br>
                Stok : ${item.stok}<br>
                Kondisi : ${item.kondisi}<br><br>

                <button class="btn-edit"
                onclick="editBarang(${item.id}, ${JSON.stringify(item.nama_barang)}, ${item.stok}, ${JSON.stringify(item.kondisi)})">
                [Edit]
                </button>

                <button class="btn-hapus"
                onclick="hapusBarang(${item.id})">
                [Hapus]
                </button>
            `;

              list.appendChild(li);
            });
          })
          .catch(err => {
            console.error("Error loading barang:", err);
            showMessage(`Gagal mengambil data barang: ${err.message}`, "error");
          });
      }

      // =======================
      // TAMBAH BARANG
      // =======================
      function tambah() {
        const inputs = [
          document.getElementById("nama"),
          document.getElementById("stok"),
          document.getElementById("kondisi")
        ];

        if (!validateInput(inputs)) return;

        let nama = inputs[0].value;
        let stok = inputs[1].value;
        let kondisi = inputs[2].value;

        fetch(`${API_URL}/tambah`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            nama,
            stok: parseInt(stok),
            kondisi,
          }),
        })
          .then((res) => {
            if (!res.ok) return res.json().then(e => Promise.reject(e));
            return res.json();
          })
          .then(() => {
            showMessage("Barang berhasil ditambahkan", "success");
            clearInputs("nama", "stok", "kondisi");
            load();
            loadStatistik();
          })
          .catch(err => {
            showMessage(err.error || "Gagal tambah barang", "error");
          });
      }

      // =======================
      // HAPUS BARANG
      // =======================
      function hapusBarang(id) {
        if (!confirm("Yakin hapus barang ini?")) return;

        fetch(`${API_URL}/hapus/${id}`, {
          method: "DELETE",
        })
          .then((res) => {
            if (!res.ok) return res.json().then(e => Promise.reject(e));
            return res.json();
          })
          .then(() => {
            showMessage("Barang berhasil dihapus", "success");
            load();
            loadStatistik();
          })
          .catch(err => {
            showMessage(err.error || "Gagal hapus barang", "error");
          });
      }

      // =======================
      // EDIT BARANG
      // =======================
      function editBarang(id, nama, stok, kondisi) {
        const modal = document.createElement("div");
        modal.style.cssText = `
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: rgba(0,0,0,0.5);
          display: flex;
          align-items: center;
          justify-content: center;
          z-index: 999;
        `;

        const editDiv = document.createElement("div");
        editDiv.style.cssText = `
          background: white;
          padding: 30px;
          border-radius: 15px;
          max-width: 400px;
          width: 90%;
        `;

        const inputNama = document.createElement("input");
        inputNama.type = "text";
        inputNama.id = "editNama";
        inputNama.value = nama;
        inputNama.placeholder = "Nama Barang";
        inputNama.style.cssText = "width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px;";

        const inputStok = document.createElement("input");
        inputStok.type = "number";
        inputStok.id = "editStok";
        inputStok.value = stok;
        inputStok.placeholder = "Stok";
        inputStok.style.cssText = "width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px;";

        const inputKondisi = document.createElement("input");
        inputKondisi.type = "text";
        inputKondisi.id = "editKondisi";
        inputKondisi.value = kondisi;
        inputKondisi.placeholder = "Kondisi";
        inputKondisi.style.cssText = "width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px;";

        const h3 = document.createElement("h3");
        h3.textContent = "Edit Barang";
        h3.style.marginBottom = "15px";

        const btnContainer = document.createElement("div");
        btnContainer.style.cssText = "display: flex; gap: 10px; margin-top: 20px;";

        const btnSimpan = document.createElement("button");
        btnSimpan.textContent = "Simpan";
        btnSimpan.className = "btn-tambah";
        btnSimpan.style.cssText = "flex: 1;";
        btnSimpan.onclick = () => submitEdit(id);

        const btnBatal = document.createElement("button");
        btnBatal.textContent = "Batal";
        btnBatal.style.cssText = "flex: 1; background: #95a5a6; color: white; padding: 10px; border: none; border-radius: 8px; cursor: pointer;";
        btnBatal.onclick = () => modal.remove();

        btnContainer.appendChild(btnSimpan);
        btnContainer.appendChild(btnBatal);

        editDiv.appendChild(h3);
        editDiv.appendChild(inputNama);
        editDiv.appendChild(inputStok);
        editDiv.appendChild(inputKondisi);
        editDiv.appendChild(btnContainer);

        modal.appendChild(editDiv);
        document.body.appendChild(modal);
      }

      function submitEdit(id) {
        const namaBaru = document.getElementById("editNama").value;
        const stokBaru = document.getElementById("editStok").value;
        const kondisiBaru = document.getElementById("editKondisi").value;

        if (!namaBaru.trim() || !stokBaru || !kondisiBaru.trim()) {
          showMessage("Semua field harus diisi", "error");
          return;
        }

        fetch(`${API_URL}/edit/${id}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            nama: namaBaru,
            stok: parseInt(stokBaru),
            kondisi: kondisiBaru,
          }),
        })
          .then((res) => {
            if (!res.ok) return res.json().then(e => Promise.reject(e));
            return res.json();
          })
          .then(() => {
            showMessage("Barang berhasil diperbarui", "success");
            document.querySelector("div[style*='position: fixed'][style*='background: rgba']").remove();
            load();
            loadStatistik();
          })
          .catch(err => {
            showMessage(err.error || "Gagal edit barang", "error");
          });
      }

      // =======================
      // PINJAM
      // =======================
      function pinjam() {
        const inputs = [
          document.getElementById("nama_peminjam"),
          document.getElementById("barang_pinjam"),
          document.getElementById("jumlah"),
          document.getElementById("tgl_pinjam")
        ];

        if (!validateInput(inputs)) return;

        let nama = inputs[0].value;
        let barang = inputs[1].value;
        let jumlah = inputs[2].value;
        let tgl_pinjam = inputs[3].value;

        fetch(`${API_URL}/pinjam`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            nama,
            barang,
            jumlah: parseInt(jumlah),
            tgl_pinjam,
          }),
        })
          .then((res) => {
            if (!res.ok) return res.json().then(e => Promise.reject(e));
            return res.json();
          })
          .then(() => {
            showMessage("Peminjaman berhasil dicatat", "success");
            clearInputs("nama_peminjam", "barang_pinjam", "jumlah", "tgl_pinjam");
            load();
            loadPinjam();
            loadStatistik();
          })
          .catch(err => {
            showMessage(err.error || "Gagal pinjam barang", "error");
          });
      }

      // =======================
      // LOAD PEMINJAMAN
      // =======================
      function loadPinjam() {
        console.log("Loading peminjaman from:", `${API_URL}/peminjaman`);
        fetch(`${API_URL}/peminjaman`)
          .then((res) => {
            if (!res.ok) throw new Error(`API Error ${res.status}: ${res.statusText}`);
            return res.json();
          })
          .then((data) => {
            let list = document.getElementById("listPinjam");
            list.innerHTML = "";

            if (data.length === 0) {
              list.innerHTML = "<li>Tidak ada data peminjaman</li>";
              return;
            }

            data.forEach((item) => {
              let li = document.createElement("li");
              const statusClass = item.status === "dipinjam" ? "status-dipinjam" : "status-kembali";

              li.innerHTML = `
                <strong>${item.nama_peminjam}</strong><br>
                Barang : ${item.nama_barang}<br>
                Jumlah : ${item.jumlah}<br>
                Tanggal Pinjam : ${item.tanggal_pinjam}<br>
                Status : <b class="${statusClass}">${item.status}</b><br>
                Tanggal Kembali : ${item.tanggal_kembali || "-"}

                <br><br>

                ${
                  item.status === "dipinjam"
                    ? `<button class="btn-kembali"
                    onclick="kembalikan(${item.id})">
                    [Kembalikan]
                    </button>`
                    : ""
                }
            `;

              list.appendChild(li);
            });
          })
          .catch(err => {
            console.error("Error loading peminjaman:", err);
            showMessage(`Gagal mengambil data peminjaman: ${err.message}`, "error");
          });
      }

      // =======================
      // KEMBALIKAN
      // =======================
      function kembalikan(id) {
        if (!confirm("Yakin kembalikan barang ini?")) return;

        fetch(`${API_URL}/kembalikan/${id}`, {
          method: "PUT",
        })
          .then((res) => {
            if (!res.ok) return res.json().then(e => Promise.reject(e));
            return res.json();
          })
          .then(() => {
            showMessage("Barang berhasil dikembalikan", "success");
            load();
            loadPinjam();
            loadStatistik();
          })
          .catch(err => {
            showMessage(err.error || "Gagal mengembalikan barang", "error");
          });
      }

      // =======================
      // STATISTIK
      // =======================
      function loadStatistik() {
        fetch(`${API_URL}/barang`)
          .then((res) => {
            if (!res.ok) throw new Error(`API Error ${res.status}: ${res.statusText}`);
            return res.json();
          })
          .then((data) => {
            document.getElementById("totalBarang").innerText = data.length;
          })
          .catch(err => console.error("Error loading statistik barang:", err));

        fetch(`${API_URL}/peminjaman`)
          .then((res) => {
            if (!res.ok) throw new Error(`API Error ${res.status}: ${res.statusText}`);
            return res.json();
          })
          .then((data) => {
            let dipinjam = data.filter(
              (item) => item.status === "dipinjam",
            ).length;

            let kembali = data.filter(
              (item) => item.status === "dikembalikan",
            ).length;

            document.getElementById("sedangDipinjam").innerText = dipinjam;
            document.getElementById("sudahKembali").innerText = kembali;
          })
          .catch(err => console.error(err));
      }

      // =======================
      // INITIALIZE
      // =======================
      document.addEventListener("DOMContentLoaded", () => {
        console.log("=== App Started ===");
        console.log("Hostname:", window.location.hostname);
        console.log("API URL:", API_URL);
        console.log("=====================");
        load();
        loadPinjam();
        loadStatistik();

        // Refresh data setiap 5 detik
        setInterval(() => {
          loadStatistik();
        }, 5000);
      });
    </script>
  </body>
</html>
